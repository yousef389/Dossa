<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم DOSSA (Backend محلي)</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background:#0A0E14; color:#E0E0E0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    #loginScreen { background:#111C26; padding:40px; border-radius:32px; width:100%; max-width:420px; border:1px solid #2A3A4A; }
    #loginScreen h2 { color:#00D2FF; margin-bottom:24px; text-align:center; }
    .input-group { margin-bottom:20px; }
    .input-group input { width:100%; padding:16px; background:#1E2A36; border:1px solid #2A3A4A; border-radius:16px; color:#fff; font-size:1rem; }
    .btn-login { width:100%; background:#00D2FF; color:#0A0E14; padding:16px; border:none; border-radius:40px; font-weight:700; cursor:pointer; }
    .btn-login:hover { box-shadow:0 0 30px #00D2FF; }
    .error-msg { color:#ff4d4d; margin-top:16px; text-align:center; }
    #dashboardScreen { display:none; width:100%; padding:20px; }
    .admin-container { max-width:1400px; margin:0 auto; }
    .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
    .admin-header h1 { color:#00D2FF; }
    .logout-btn { background:transparent; border:1px solid #ff4d4d; color:#ff4d4d; padding:10px 24px; border-radius:40px; cursor:pointer; }
    .tabs { display:flex; gap:10px; margin-bottom:30px; border-bottom:1px solid #2A3A4A; }
    .tab { padding:12px 24px; background:transparent; border:none; color:#AAA; font-weight:600; cursor:pointer; border-radius:12px 12px 0 0; }
    .tab.active { background:#1E2A36; color:#00D2FF; }
    .panel { background:#111C26; border-radius:24px; padding:30px; border:1px solid #2A3A4A; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; margin-bottom:8px; font-weight:600; color:#00D2FF; }
    .form-group input, .form-group select { width:100%; padding:14px; background:#1E2A36; border:1px solid #2A3A4A; border-radius:12px; color:#fff; }
    .btn { background:#00D2FF; color:#0A0E14; padding:14px 30px; border:none; border-radius:40px; font-weight:700; cursor:pointer; margin-right:10px; }
    .btn-outline { background:transparent; border:1px solid #00D2FF; color:#00D2FF; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { padding:16px; text-align:right; border-bottom:1px solid #2A3A4A; }
    .product-thumb { width:60px; height:60px; object-fit:cover; border-radius:12px; }
    .action-icons i { margin:0 8px; cursor:pointer; color:#AAA; }
    .action-icons i:hover { color:#00D2FF; }
    .progress-bar-container { margin-top:10px; height:6px; background:#1E2A36; border-radius:6px; }
    .progress-bar { height:100%; width:0%; background:#00D2FF; border-radius:6px; }
    .social-inputs { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    #settingsMsg { margin-top:20px; color:#0f0; }
  </style>
</head>
<body>

<div id="loginScreen">
  <h2><i class="fas fa-lock"></i> دخول المشرف</h2>
  <div class="input-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" value="admin@dossa.com"></div>
  <div class="input-group"><input type="password" id="loginPassword" placeholder="كلمة المرور" value="admin123"></div>
  <button class="btn-login" id="loginBtn">تسجيل الدخول</button>
  <div class="error-msg" id="loginError"></div>
</div>

<div id="dashboardScreen">
  <div class="admin-container">
    <div class="admin-header">
      <h1><i class="fas fa-shoe-prints"></i> لوحة تحكم DOSSA (محلي)</h1>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="products"><i class="fas fa-box"></i> المنتجات</button>
      <button class="tab" data-tab="settings"><i class="fas fa-cog"></i> إعدادات التواصل</button>
    </div>
    <div id="productsPanel" class="panel">
      <h2 style="margin-bottom:20px;"><i class="fas fa-plus-circle" style="color:#00D2FF;"></i> إضافة / تعديل منتج</h2>
      <div class="form-grid">
        <div class="form-group"><label>اسم المنتج</label><input type="text" id="prodName"></div>
        <div class="form-group"><label>السعر (ج.م)</label><input type="number" id="prodPrice"></div>
        <div class="form-group"><label>الفئة</label><select id="prodCategory"><option value="Casual">كاجوال</option><option value="Street">ستريت</option><option value="Sport">رياضي</option></select></div>
        <div class="form-group"><label>العلامة</label><input type="text" id="prodLabel" placeholder="مثلاً: New Drop"></div>
        <div class="form-group"><label>صورة المنتج</label><input type="file" id="prodImage" accept="image/*"></div>
      </div>
      <div class="progress-bar-container"><div class="progress-bar" id="uploadProgress"></div></div>
      <button class="btn" id="addProductBtn"><i class="fas fa-cloud-upload-alt"></i> إضافة المنتج</button>
      <button class="btn btn-outline" id="cancelEditBtn" style="display:none;">إلغاء التعديل</button>
      <h2 style="margin:40px 0 20px;"><i class="fas fa-list"></i> قائمة المنتجات</h2>
      <table id="productsTable"><thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>الفئة</th><th>العلامة</th><th>إجراءات</th></tr></thead><tbody></tbody></table>
    </div>
    <div id="settingsPanel" class="panel" style="display:none;">
      <h2 style="margin-bottom:20px;"><i class="fab fa-whatsapp"></i> معلومات التواصل والسوشيال ميديا</h2>
      <div class="social-inputs">
        <div class="form-group"><label>رقم واتساب (مع الكود)</label><input type="text" id="waNumber" placeholder="201234567890"></div>
        <div class="form-group"><label>رقم الهاتف البديل</label><input type="text" id="phoneNumber"></div>
        <div class="form-group"><label>رابط إنستغرام</label><input type="text" id="instaLink"></div>
        <div class="form-group"><label>رابط فيسبوك</label><input type="text" id="fbLink"></div>
        <div class="form-group"><label>رابط تيك توك</label><input type="text" id="tiktokLink"></div>
      </div>
      <button class="btn" id="saveSettingsBtn"><i class="fas fa-save"></i> حفظ الإعدادات</button>
      <p id="settingsMsg"></p>
    </div>
  </div>
</div>

<script>
  (function(){
    // ------------------- محاكاة API (Mock Backend) -------------------
    const MOCK_DELAY = 300; // تأخير بسيط لمحاكاة الشبكة
    const STORAGE_PRODUCTS = 'mock_products';
    const STORAGE_SETTINGS = 'mock_settings';

    // تهيئة البيانات الافتراضية
    if (!localStorage.getItem(STORAGE_PRODUCTS)) {
      const defaultProducts = [
        { id: '1', name: 'حذاء رياضي نايك', price: 1200, category: 'Sport', label: 'جديد', imageUrl: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200&h=200&fit=crop', createdAt: Date.now() },
        { id: '2', name: 'حذاء كاجوال جلد', price: 850, category: 'Casual', label: '', imageUrl: 'https://images.unsplash.com/photo-1460353581641-37baddab0fa2?w=200&h=200&fit=crop', createdAt: Date.now() - 10000 }
      ];
      localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(defaultProducts));
    }
    if (!localStorage.getItem(STORAGE_SETTINGS)) {
      const defaultSettings = {
        whatsappNumber: '201234567890',
        phone: '0223456789',
        instagram: 'https://instagram.com/dossa',
        facebook: 'https://facebook.com/dossa',
        tiktok: 'https://tiktok.com/@dossa'
      };
      localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(defaultSettings));
    }

    // دوال مساعدة لمحاكاة API
    const mockAPI = {
      // منتجات
      getProducts: () => {
        return new Promise(resolve => {
          setTimeout(() => {
            const data = JSON.parse(localStorage.getItem(STORAGE_PRODUCTS)) || [];
            resolve(data);
          }, MOCK_DELAY);
        });
      },
      addProduct: (product) => {
        return new Promise(resolve => {
          setTimeout(() => {
            const products = JSON.parse(localStorage.getItem(STORAGE_PRODUCTS)) || [];
            const newId = Date.now() + '' + Math.floor(Math.random() * 1000);
            const newProduct = { ...product, id: newId, createdAt: Date.now() };
            products.push(newProduct);
            localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products));
            resolve(newProduct);
          }, MOCK_DELAY);
        });
      },
      updateProduct: (id, updates) => {
        return new Promise((resolve, reject) => {
          setTimeout(() => {
            const products = JSON.parse(localStorage.getItem(STORAGE_PRODUCTS)) || [];
            const index = products.findIndex(p => p.id === id);
            if (index === -1) return reject('المنتج غير موجود');
            products[index] = { ...products[index], ...updates, updatedAt: Date.now() };
            localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(products));
            resolve(products[index]);
          }, MOCK_DELAY);
        });
      },
      deleteProduct: (id) => {
        return new Promise(resolve => {
          setTimeout(() => {
            const products = JSON.parse(localStorage.getItem(STORAGE_PRODUCTS)) || [];
            const filtered = products.filter(p => p.id !== id);
            localStorage.setItem(STORAGE_PRODUCTS, JSON.stringify(filtered));
            resolve(true);
          }, MOCK_DELAY);
        });
      },
      // إعدادات
      getSettings: () => {
        return new Promise(resolve => {
          setTimeout(() => {
            const data = JSON.parse(localStorage.getItem(STORAGE_SETTINGS)) || {};
            resolve(data);
          }, MOCK_DELAY);
        });
      },
      saveSettings: (settings) => {
        return new Promise(resolve => {
          setTimeout(() => {
            localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings));
            resolve(settings);
          }, MOCK_DELAY);
        });
      }
    };

    // ------------------- منطق التطبيق (باستخدام Mock API) -------------------
    const loginScreen = document.getElementById('loginScreen');
    const dashboardScreen = document.getElementById('dashboardScreen');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginError = document.getElementById('loginError');
    const tabBtns = document.querySelectorAll('.tab');
    const panels = { 
      products: document.getElementById('productsPanel'), 
      settings: document.getElementById('settingsPanel') 
    };
    const prodName = document.getElementById('prodName');
    const prodPrice = document.getElementById('prodPrice');
    const prodCategory = document.getElementById('prodCategory');
    const prodLabel = document.getElementById('prodLabel');
    const prodImage = document.getElementById('prodImage');
    const addBtn = document.getElementById('addProductBtn');
    const cancelBtn = document.getElementById('cancelEditBtn');
    const progressBar = document.getElementById('uploadProgress');
    const tbody = document.querySelector('#productsTable tbody');
    const waNumber = document.getElementById('waNumber');
    const phoneNumber = document.getElementById('phoneNumber');
    const instaLink = document.getElementById('instaLink');
    const fbLink = document.getElementById('fbLink');
    const tiktokLink = document.getElementById('tiktokLink');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const settingsMsg = document.getElementById('settingsMsg');

    let currentEditId = null;
    let isLoggedIn = false;

    // --- المصادقة البسيطة (ثابتة للتجربة) ---
    const VALID_EMAIL = 'admin@dossa.com';
    const VALID_PASSWORD = 'admin123';

    loginBtn.addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      if (email === VALID_EMAIL && pass === VALID_PASSWORD) {
        isLoggedIn = true;
        loginScreen.style.display = 'none';
        dashboardScreen.style.display = 'block';
        loadProductsTable();
        loadSettingsForm();
        loginError.textContent = '';
      } else {
        loginError.textContent = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
      }
    });

    logoutBtn.addEventListener('click', () => {
      isLoggedIn = false;
      dashboardScreen.style.display = 'none';
      loginScreen.style.display = 'flex';
      document.getElementById('loginPassword').value = '';
    });

    // التحقق من الجلسة عند التحميل (محاكاة)
    if (!isLoggedIn) {
      dashboardScreen.style.display = 'none';
      loginScreen.style.display = 'flex';
    }

    // التبويبات
    tabBtns.forEach(btn => btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      panels.products.style.display = tab === 'products' ? 'block' : 'none';
      panels.settings.style.display = tab === 'settings' ? 'block' : 'none';
    }));

    // --- تحميل جدول المنتجات ---
    async function loadProductsTable() {
      try {
        const products = await mockAPI.getProducts();
        let html = '';
        products.forEach(p => {
          html += `<tr>
            <td><img src="${p.imageUrl || ''}" class="product-thumb" onerror="this.src='https://via.placeholder.com/60?text=No+Img'"></td>
            <td>${p.name}</td>
            <td>${p.price} ج.م</td>
            <td>${p.category}</td>
            <td>${p.label || '-'}</td>
            <td class="action-icons">
              <i class="fas fa-edit" onclick="editProduct('${p.id}')"></i>
              <i class="fas fa-trash-alt" onclick="deleteProduct('${p.id}')"></i>
            </td>
          </tr>`;
        });
        tbody.innerHTML = html || '<tr><td colspan="6" style="text-align:center;padding:20px;">لا توجد منتجات</td></tr>';
      } catch (err) {
        alert('فشل تحميل المنتجات: ' + err);
      }
    }

    // --- تعديل منتج ---
    window.editProduct = async (id) => {
      try {
        const products = await mockAPI.getProducts();
        const p = products.find(prod => prod.id === id);
        if (!p) return;
        prodName.value = p.name;
        prodPrice.value = p.price;
        prodCategory.value = p.category;
        prodLabel.value = p.label || '';
        currentEditId = id;
        addBtn.innerHTML = '<i class="fas fa-save"></i> تحديث المنتج';
        cancelBtn.style.display = 'inline-block';
        // نترك الصورة فارغة؛ سنتعامل معها عند الحفظ
      } catch (err) {
        alert('خطأ: ' + err);
      }
    };

    // --- حذف منتج ---
    window.deleteProduct = async (id) => {
      if (!confirm('متأكد من حذف المنتج؟')) return;
      try {
        await mockAPI.deleteProduct(id);
        await loadProductsTable();
      } catch (err) {
        alert('فشل الحذف: ' + err);
      }
    };

    // --- إلغاء التعديل ---
    cancelBtn.onclick = () => {
      currentEditId = null;
      addBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> إضافة المنتج';
      cancelBtn.style.display = 'none';
      prodName.value = prodPrice.value = prodLabel.value = '';
      prodImage.value = '';
      progressBar.style.width = '0%';
    };

    // --- تحويل الصورة إلى Base64 (محاكاة رفع) ---
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // --- إضافة / تحديث المنتج ---
    addBtn.onclick = async () => {
      if (!prodName.value.trim() || !prodPrice.value) {
        alert('الاسم والسعر مطلوبان');
        return;
      }

      const file = prodImage.files[0];
      let imageUrl = '';

      // محاكاة شريط التقدم
      progressBar.style.width = '0%';
      const progressInterval = setInterval(() => {
        let w = parseFloat(progressBar.style.width) || 0;
        if (w < 90) progressBar.style.width = (w + 10) + '%';
      }, 100);

      try {
        // إذا كان تعديل ولم يتم اختيار صورة جديدة، نحافظ على الصورة القديمة
        if (currentEditId && !file) {
          const products = await mockAPI.getProducts();
          const oldProduct = products.find(p => p.id === currentEditId);
          imageUrl = oldProduct ? oldProduct.imageUrl : '';
        } else if (file) {
          // تحويل الصورة إلى Base64 لتخزينها محلياً
          imageUrl = await fileToBase64(file);
        } else {
          // إضافة جديدة بدون صورة
          imageUrl = '';
        }

        const productData = {
          name: prodName.value.trim(),
          price: Number(prodPrice.value),
          category: prodCategory.value,
          label: prodLabel.value || '',
          imageUrl: imageUrl
        };

        if (currentEditId) {
          await mockAPI.updateProduct(currentEditId, productData);
        } else {
          await mockAPI.addProduct(productData);
        }

        clearInterval(progressInterval);
        progressBar.style.width = '100%';
        setTimeout(() => progressBar.style.width = '0%', 500);

        cancelBtn.click(); // إعادة تعيين النموذج
        await loadProductsTable();
      } catch (error) {
        clearInterval(progressInterval);
        progressBar.style.width = '0%';
        alert('حدث خطأ: ' + error.message);
      }
    };

    // --- تحميل إعدادات التواصل ---
    async function loadSettingsForm() {
      try {
        const settings = await mockAPI.getSettings();
        waNumber.value = settings.whatsappNumber || '';
        phoneNumber.value = settings.phone || '';
        instaLink.value = settings.instagram || '';
        fbLink.value = settings.facebook || '';
        tiktokLink.value = settings.tiktok || '';
      } catch (err) {
        console.warn('فشل تحميل الإعدادات', err);
      }
    }

    // --- حفظ الإعدادات ---
    saveSettingsBtn.onclick = async () => {
      const settings = {
        whatsappNumber: waNumber.value.trim(),
        phone: phoneNumber.value.trim(),
        instagram: instaLink.value.trim(),
        facebook: fbLink.value.trim(),
        tiktok: tiktokLink.value.trim()
      };
      try {
        await mockAPI.saveSettings(settings);
        settingsMsg.textContent = 'تم الحفظ بنجاح ✓';
        setTimeout(() => settingsMsg.textContent = '', 3000);
      } catch (err) {
        settingsMsg.textContent = 'فشل الحفظ!';
        settingsMsg.style.color = '#ff4d4d';
        setTimeout(() => { settingsMsg.textContent = ''; settingsMsg.style.color = '#0f0'; }, 3000);
      }
    };

    // تعريض دوال التعديل والحذف للنطاق العام (للاستدعاء من onclick)
    window.editProduct = editProduct;
    window.deleteProduct = deleteProduct;

    // تحميل أولي للوحة التحكم إذا كان مسجلاً (للتجربة نتركه مخفي حتى تسجيل الدخول)
    // لكن نضمن أنه في حالة وجود تسجيل سابق (محاكاة) لا شيء
  })();
</script>
</body>
</html>
